services:
  backend:
    build:
      args:
        SLEEPAGENT_INSTALL_EXTRAS: "postgres,experiments"
    environment:
      SLEEPAGENT_SHHS_ROOT: /data/shhs_sample
    volumes:
      - type: bind
        source: ${SLEEPAGENT_SHHS_ROOT_HOST:-../data/raw/shhs_sample}
        target: /data/shhs_sample
        read_only: true
